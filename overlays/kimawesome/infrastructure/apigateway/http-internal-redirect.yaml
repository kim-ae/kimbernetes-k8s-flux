apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-filter-redirect
spec:
  parentRefs:
  - name: internal-gateway
    namespace: kube-system
    sectionName: http
  hostnames:
  - "*.internal.kim.tec.br"
  rules:
  - name: https-redirect
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
