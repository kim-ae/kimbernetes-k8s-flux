apiVersion: v1
kind: Service
metadata:
  name: media-center-exporters
  labels:
    app: media-center-exporters
    machine_name: media-center
spec:
  ports:
    - name: node
      port: 9100
      targetPort: 9100
      protocol: TCP
    - name: process
      port: 9256
      targetPort: 9256
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: media-center-exporters
  labels:
    app: media-center-exporters
    machine_name: media-center
subsets:
  - addresses:
      - ip: 192.168.0.110
    ports:
      - name: node
        port: 9100
      - name: process
        port: 9256
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: media-center-exporters
spec:
  selector:
    matchLabels:
      app: media-center-exporters
  # Copies the Service's "machine_name" label onto every metric scraped from this
  # target, so Prometheus/Grafana can filter/group by machine_name=media-center.
  targetLabels:
    - machine_name
  endpoints:
    - port: node
      interval: 30s
      path: /metrics
    - port: process
      interval: 30s
      path: /metrics
