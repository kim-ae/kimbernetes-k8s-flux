apiVersion: v1
kind: Service
metadata:
  name: xps-notebook-exporters
  labels:
    app: xps-notebook-exporters
    machine_name: xps-notebook
spec:
  ports:
    - name: node
      port: 9100
      targetPort: 9100
      protocol: TCP
    - name: process
      port: 9256
      targetPort: 9256
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: xps-notebook-exporters
  labels:
    app: xps-notebook-exporters
    machine_name: xps-notebook
subsets:
  - addresses:
      - ip: 192.168.0.221
    ports:
      - name: node
        port: 9100
      - name: process
        port: 9256
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: xps-notebook-exporters
spec:
  selector:
    matchLabels:
      app: xps-notebook-exporters
  # Copies the Service's "machine_name" label onto every metric scraped from this
  # target, so Prometheus/Grafana can filter/group by machine_name=xps-notebook.
  targetLabels:
    - machine_name
  endpoints:
    - port: node
      interval: 30s
      path: /metrics
    - port: process
      interval: 30s
      path: /metrics
