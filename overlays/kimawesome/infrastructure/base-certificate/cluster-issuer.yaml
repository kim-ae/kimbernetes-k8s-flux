apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cluster-issuer
spec:
  acme:
    email: kim.ae09@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: issuer-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: http-gateway
                namespace: kube-system
                kind: Gateway
                sectionName: http
      - selector:
          dnsNames:
            - "*.kim.tec.br"
            - "kim.tec.br"
        dns01:
          acmeDNS:
            host: http://acme-dns.kube-system.svc.cluster.local
            accountSecretRef:
              name: acme-dns-account
              key: acmedns.json
