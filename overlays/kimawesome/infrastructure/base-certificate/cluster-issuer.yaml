    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: issuer-account-key
    solvers:
      # - http01:
      #     gatewayHTTPRoute:
      #       parentRefs:
      #         - name: http-gateway
      #           namespace: kube-system
      #           kind: Gateway
      #           sectionName: http
      - selector:
          dnsNames:
            - "kim.tec.br"
            - "*.kim.tec.br"
        dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-secret
              key: api-token
