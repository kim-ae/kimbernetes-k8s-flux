# Persists iptables PREROUTING DNAT rules in the Tailscale subnet router pod's network namespace.
# Cilium does not DNAT LoadBalancer VIPs or ClusterIPs for forwarded traffic (only for locally-originated
# pod connections via cgroup socket hooks). This DaemonSet bridges the gap by translating VIPs to
# backend pod IPs inside the pod before the packet exits via eth0.
#
# Flow: phone -> tailscale0 -> PREROUTING DNAT (192.168.10.x -> backend pod IP) -> FORWARD/MASQUERADE
#       -> eth0 -> Cilium routes pod-to-pod -> backend -> response path reverses via conntrack.
#
# Backend pod IPs are read dynamically from the Kubernetes Endpoints API at startup to handle pod restarts.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ts-subnet-router-dnat
  namespace: vpn
  labels:
    app: ts-subnet-router-dnat
spec:
  selector:
    matchLabels:
      app: ts-subnet-router-dnat
  template:
    metadata:
      labels:
        app: ts-subnet-router-dnat
    spec:
      nodeSelector:
        kubernetes.io/hostname: node01-82nm
      hostPID: true
      serviceAccountName: ts-subnet-router-dnat
      tolerations:
        - operator: Exists
      containers:
        - name: dnat-fix
          image: bitnami/kubectl:latest
          securityContext:
            privileged: true
          command: [/bin/sh, -c]
          args:
            - |
              set -e

              # Install iptables and nsenter (util-linux)
              apt-get update -qq && apt-get install -y -qq iptables util-linux 2>/dev/null

              add_rules() {
                local POD_PID="$1"
                local GW_IP="$2"
                local BACKEND_IP="$3"
                local PORT="$4"

                nsenter --net=/proc/${POD_PID}/ns/net -- iptables -t nat -C PREROUTING \
                  -d "${GW_IP}" -p tcp --dport "${PORT}" -j DNAT --to-destination "${BACKEND_IP}:${PORT}" \
                  2>/dev/null || \
                nsenter --net=/proc/${POD_PID}/ns/net -- iptables -t nat -I PREROUTING \
                  -d "${GW_IP}" -p tcp --dport "${PORT}" -j DNAT --to-destination "${BACKEND_IP}:${PORT}"
              }

              while true; do
                # Find PID of tailscaled in the subnet router pod
                POD_PID=""
                for pid in $(ls /proc/ 2>/dev/null | grep '^[0-9]*$'); do
                  comm=$(cat /proc/$pid/comm 2>/dev/null || true)
                  if [ "$comm" = "tailscaled" ]; then
                    # Verify it has a tailscale0 interface (to distinguish from any other tailscaled)
                    if nsenter --net=/proc/$pid/ns/net -- ip link show tailscale0 >/dev/null 2>&1; then
                      POD_PID=$pid
                      break
                    fi
                  fi
                done

                if [ -z "$POD_PID" ]; then
                  echo "tailscaled with tailscale0 not found, retrying in 10s..."
                  sleep 10
                  continue
                fi

                # Resolve backend pod IPs dynamically from Endpoints API
                INTERNAL_GW_IP=$(kubectl get endpoints -n kube-system internal-gateway \
                  -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || echo "")
                HTTPS_GW_IP=$(kubectl get endpoints -n kube-system https-gateway \
                  -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || echo "")
                HTTP_GW_IP=$(kubectl get endpoints -n kube-system http-gateway \
                  -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || echo "")

                if [ -n "$INTERNAL_GW_IP" ]; then
                  add_rules "$POD_PID" "192.168.10.2" "$INTERNAL_GW_IP" "443"
                  add_rules "$POD_PID" "192.168.10.2" "$INTERNAL_GW_IP" "80"
                fi
                if [ -n "$HTTPS_GW_IP" ]; then
                  add_rules "$POD_PID" "192.168.10.1" "$HTTPS_GW_IP" "443"
                fi
                if [ -n "$HTTP_GW_IP" ]; then
                  add_rules "$POD_PID" "192.168.10.0" "$HTTP_GW_IP" "80"
                fi

                sleep 60
              done
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ts-subnet-router-dnat
  namespace: vpn
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ts-subnet-router-dnat
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ts-subnet-router-dnat
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ts-subnet-router-dnat
subjects:
  - kind: ServiceAccount
    name: ts-subnet-router-dnat
    namespace: vpn
