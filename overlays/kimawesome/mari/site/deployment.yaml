apiVersion: apps/v1
kind: Deployment
metadata:
  name: mari-site
  labels:
    app: mari-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mari-site
  template:
    metadata:
      labels:
        app: mari-site
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: html-root
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
        - name: html-diamante
          mountPath: /usr/share/nginx/html/logo-diamante.html
          subPath: logo-diamante.html
        - name: html-normal
          mountPath: /usr/share/nginx/html/logo-normal.html
          subPath: logo-normal.html
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: html-root
        configMap:
          name: mari-site-html-root
      - name: html-diamante
        configMap:
          name: mari-site-html-diamante
      - name: html-normal
        configMap:
          name: mari-site-html-normal
      - name: nginx-config
        configMap:
          name: mari-site-nginx-config
