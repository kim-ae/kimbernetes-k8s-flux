server {
    listen 8080;
    server_name dra.marianacabral.odo.br;

    root /usr/share/nginx/html;
    index index.html;

    # Root page
    location = / {
        try_files /index.html =404;
    }

    # Logo diamante page (with and without trailing slash)
    location = /logo-diamante {
        try_files /logo-diamante.html =404;
    }

    # Logo normal page (with and without trailing slash)
    location = /logo-normal {
        try_files /logo-normal.html =404;
    }

    # Serve static HTML files
    location ~ \.html$ {
        add_header Content-Type text/html;
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/html text/css application/json application/javascript text/xml;
}
