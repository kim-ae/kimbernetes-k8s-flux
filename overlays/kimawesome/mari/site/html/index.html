  <title>Dra. Mariana Cabral – Em Construção</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #d4f2f2 0%, #8dd8e0 60%, #6bc4ce 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 32px 20px 48px;
    }
    .logo-top {
      max-width: 700px;
      width: 90%;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,100,120,0.18);
      margin-bottom: 36px;
    }
    .construction-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .construction-img {
      max-width: 380px;
      width: 80%;
      border-radius: 50%;
      box-shadow: 0 8px 40px rgba(0,100,120,0.22);
      border: 6px solid #fff;
    }
    h1 {
      color: #14636e;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      text-shadow: 0 2px 8px rgba(255,255,255,0.5);
      letter-spacing: 0.03em;
    }
    p {
      color: #1e7a87;
      font-size: 1.1rem;
      text-align: center;
      max-width: 480px;
      line-height: 1.7;
    }
    .badge {
      display: inline-block;
      background: #f0d23c;
      color: #5a3e00;
      font-weight: 700;
      padding: 8px 24px;
      border-radius: 32px;
      font-size: 0.95rem;
      box-shadow: 0 2px 12px rgba(240,210,60,0.45);
      letter-spacing: 0.04em;
    }
  </style>
