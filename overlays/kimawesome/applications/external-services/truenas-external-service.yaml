apiVersion: v1
kind: Service
metadata:
  name: truenas-external-service
spec:
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
      appProtocol: https
---
apiVersion: v1
kind: Endpoints
metadata:
  name: truenas-external-service
subsets:
  - addresses:
      - ip: 192.168.0.40
    ports:
      - port: 443
        name: https
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: truenas-external-service
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: https
  hostnames:
    - truenas.internal.kim.tec.br
  rules:
    - backendRefs:
        - name: truenas-external-service
          port: 443
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: BackendConfigPolicy
metadata:
  name: truenas-tls-insecure
  namespace: default
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: truenas-external-service
  tls:
    insecureSkipVerify: true
