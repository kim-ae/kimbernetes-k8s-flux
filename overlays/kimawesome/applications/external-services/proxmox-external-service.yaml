apiVersion: v1
kind: Service
metadata:
  name: proxmox-external-service
spec:
  ports:
    - name: https
      port: 8006
      targetPort: 8006
      protocol: TCP
      appProtocol: https
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox-external-service
subsets:
  - addresses:
      - ip: 192.168.0.4
    ports:
      - port: 8006
        name: https
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: proxmox-external-service
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: https
  hostnames:
    - proxmox.internal.kim.tec.br
  rules:
    - backendRefs:
        - name: proxmox-external-service
          port: 8006
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: BackendConfigPolicy
metadata:
  name: proxmox-tls-insecure
  namespace: default
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: proxmox-external-service
  tls:
    insecureSkipVerify: true
