apiVersion: v1
kind: Service
metadata:
  name: proxmox-external-service
spec:
  ports:
    - port: 8006
      targetPort: 8006
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox-external-service
subsets:
  - addresses:
      - ip: 192.168.0.4
    ports:
      - port: 8006
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: proxmox-external-service
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: https
  hostnames:
    - proxmox.internal.kim.tec.br
  rules:
    - backendRefs:
        - name: proxmox-external-service
          port: 8006
