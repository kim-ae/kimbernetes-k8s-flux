apiVersion: v1
kind: Service
metadata:
  name: drive-external-service
spec:
  ports:
    - port: 80
      targetPort: 8085
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: drive-external-service
subsets:
  - addresses:
      - ip: 192.168.0.111
    ports:
      - port: 8085
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: drive-external-service
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
      sectionName: https
  hostnames:
    - drive.internal.kim.tec.br
  rules:
    - backendRefs:
        - name: drive-external-service
          port: 80
