apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-web-automated-config
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: local-storage
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: calibre-web-automated-config
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: local-storage
  capacity:
    storage: 5Gi
  hostPath:
    path: /mnt/calibre/config
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - node01-82nm
