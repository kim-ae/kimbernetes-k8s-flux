options {
    directory "/var/cache/bind";
    recursion yes;
    edns-options;
    edns-udp-size 4096;
    max-udp-size 4096;
    edns-version 0;
    dnssec-validation auto;
    querylog yes;
    allow-transfer { none; };
    forwarders {
        189.28.176.25;
        1.1.1.1;
    };
    allow-query { any; };
    version "Not disclosed";
};

zone "internal.kim.tec.br" IN {
    type master;
    file "/etc/bind/internal-kim-tec-br.zone";
};
