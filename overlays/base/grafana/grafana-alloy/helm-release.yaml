apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-alloy
spec:
  timeout: 15m
  chart:
    spec:
      chart: k8s-monitoring
      sourceRef:
        kind: HelmRepository
        name: grafana
      version: 3.2.2
  interval: 24h
  releaseName: grafana-monitoring
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
  # https://github.com/grafana/k8s-monitoring-helm/blob/main/charts/k8s-monitoring/values.yaml
    cluster:
      name:  ""
    clusterEvents:
      enabled: true
      labelsToKeep: ["level","namespace","node","source"]
    clusterMetrics:
      enabled: false
      kube-state-metrics:
        enabled: false
      cadvisor:
        enabled: false
      kubelet:
        enabled: false
      node-exporter:
        enabled: true
      controlPlane:
        enabled: false
      kepler:
        enabled: true
      windows-expoter:
        enabled: false
      opencost:
        enabled: false
    alloy-logs:
      enabled: true
      enableReporting: false
      alloy:
        extraEnv:
          - name: CLUSTER_NAME
            value: ""
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
      extraConfig: |
          // Dedicated, metrics-only pipeline for kgateway/Envoy access logs.
          // Tails the on-node log file for just the kgateway-proxy container
          // directly (its own discovery, not the podLogs pipeline above), and
          // discards the content after deriving metrics (forward_to = []) --
          // nothing is written to Loki from this pipeline, and the podLogs
          // pipeline above is untouched.

          discovery.kubernetes "kgateway_proxy_pods" {
            role = "pod"

            namespaces {
              names = ["kube-system"]
            }
          }

          discovery.relabel "kgateway_proxy_pods" {
            targets = discovery.kubernetes.kgateway_proxy_pods.targets

            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              regex         = "kgateway-proxy"
              action        = "keep"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
              separator     = "/"
              action        = "replace"
              replacement   = "/var/log/pods/*$1/*.log"
              target_label  = "__path__"
            }
          }

          local.file_match "kgateway_proxy_pods" {
            path_targets = discovery.relabel.kgateway_proxy_pods.output
          }

          loki.source.file "kgateway_proxy_logs" {
            targets    = local.file_match.kgateway_proxy_pods.targets
            forward_to = [loki.process.kgateway_access_log_metrics.receiver]
          }

          loki.process "kgateway_access_log_metrics" {
            forward_to = []  // metrics-only: nothing is written to Loki from here

            stage.cri {}  // unwrap the containerd log envelope to get the raw JSON line

            // loki.source.file always sets a "filename" label pointing at the
            // tailed file path, which embeds the pod UID -- drop it before it
            // reaches stage.metrics below, or every gateway pod restart would
            // mint a permanent new metric series. stage.cri also implicitly
            // sets "stream" (stdout/stderr) as a label; drop it too, it's not
            // a dimension we want on these metrics.
            stage.label_drop {
              values = ["filename", "stream"]
            }

            stage.json {
              expressions = {
                authority      = "authority",
                rule_name      = "route",
                total_duration = "total_duration",
                response_code  = "response_code",
              }
            }

            // kgateway synthesizes rule_name (Envoy's %ROUTE_NAME%) by joining
            // the gateway listener, hostname, HTTPRoute name, namespace, rule
            // name and match index with dashes, with no escaping -- so the
            // split between the HTTPRoute name and its namespace is only
            // unambiguous because this anchors on the known, finite set of
            // namespaces that actually have HTTPRoutes in this cluster today
            // (external-services, tooling, version-management, default,
            // kube-system, observability, media, mari, site). Validated
            // against every rule_name currently in Prometheus plus the
            // not-yet-seen routes, including the deliberately tricky
            // mari-site-route/mari case. If a new app lands in a namespace
            // not listed here, this stage just fails to match for that route
            // (kube_namespace/kube_service/path stay unset) rather than
            // mis-attribute it -- add the namespace to the alternation below
            // when that happens.
            stage.regex {
              source     = "rule_name"
              expression = "^(?P<gateway>[^~]+)~(?P<host>.+)-route-\\d+-httproute-(?P<kube_service>.+)-(?P<kube_namespace>external-services|tooling|version-management|default|kube-system|observability|media|mari|site)-\\d+-\\d+-(?P<path>.+)-matcher-\\d+$"
            }

            // Keep the label set small and low-cardinality: authority
            // (hostname), the decomposed HTTPRoute identity
            // (kube_namespace/kube_service/path) and response_code only.
            stage.labels {
              values = {
                authority      = "",
                kube_namespace = "",
                kube_service   = "",
                path           = "",
                response_code  = "",
              }
            }

            // Note: metric.counter/metric.histogram accept a "prefix"
            // argument documented to default to "loki_process_custom_", but
            // setting prefix = "" here does NOT clear it in this Alloy
            // version -- verified live, the metrics still land as
            // loki_process_custom_envoy_route_*. Rather than fight that, the
            // prometheus.relabel stage below strips the prefix back off
            // before remote_write, so what actually reaches Prometheus is
            // the clean envoy_route_* name.
            stage.metrics {
              metric.counter {
                name              = "envoy_route_requests_total"
                description       = "Requests observed in Envoy access logs, by hostname (authority), HTTPRoute identity (kube_namespace/kube_service/path) and response code"
                source            = "response_code"
                action            = "inc"
                max_idle_duration = "24h"
              }

              metric.histogram {
                name              = "envoy_route_request_duration_milliseconds"
                description       = "Request duration observed in Envoy access logs, by hostname (authority), HTTPRoute identity (kube_namespace/kube_service/path) and response code"
                source            = "total_duration"
                buckets           = [5, 10, 25, 50, 100, 250, 500, 1000, 2500, 5000, 10000]
                max_idle_duration = "24h"
              }
            }
          }

          // stage.metrics registers these in this Alloy instance's own
          // Prometheus registry -- nothing leaves until something scrapes it.
          // Self-scrape and remote_write it onward instead of exposing it for
          // Prometheus to pull.
          prometheus.scrape "kgateway_access_log_metrics_self" {
            targets = [{"__address__" = "127.0.0.1:12345"}]
            metrics_path    = "/metrics"
            job_name        = "kgateway-access-log-metrics"
            scrape_interval = "30s"
            forward_to      = [prometheus.relabel.envoy_route_metrics.receiver]
          }

          prometheus.relabel "envoy_route_metrics" {
            forward_to = [prometheus.remote_write.local_prometheus.receiver]

            rule {
              source_labels = ["__name__"]
              regex         = "loki_process_custom_envoy_route_.*"
              action        = "keep"
            }

            rule {
              source_labels = ["__name__"]
              regex         = "loki_process_custom_(envoy_route_.*)"
              replacement   = "$1"
              target_label  = "__name__"
              action        = "replace"
            }
          }

          // Prometheus runs as a 2-replica StatefulSet (prometheus/helmrelease.yaml
          // spec.prometheusSpec.replicas). A remote_write through the regular
          // ClusterIP service only lands on whichever single replica the
          // connection gets routed to -- the other replica, and any query
          // that happens to hit it, would never see these samples. Writing to
          // both pods directly via the prometheus-operated headless service
          // avoids that. If the replica count ever changes, this needs a
          // matching endpoint added/removed.
          prometheus.remote_write "local_prometheus" {
            endpoint {
              url = "http://prometheus-prometheus-kube-prometheus-prometheus-0.prometheus-operated.observability.svc:9090/api/v1/write"
            }
            endpoint {
              url = "http://prometheus-prometheus-kube-prometheus-prometheus-1.prometheus-operated.observability.svc:9090/api/v1/write"
            }
          }
    alloy-singleton:
      enabled: true
      enableReporting: false
      alloy:
        extraEnv:
          - name: CLUSTER_NAME
            value: ""
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
    alloy-metrics:
      enabled: false
    alloy-receiver:
      enabled: false
    nodeLogs:
      enabled: true
      labelsToKeep: ["instance","level","name","unit","service_name","source"]
      journal:
        units:
          - kubelet.service
          - containerd.service
    destinations:
      - name: loki-grafana-cloud
        type: loki
        url: http://loki-monolith.observability.svc:3100/loki/api/v1/push
    podLogs:
      enabled: true
      staticLabels:
        source: "pods"
      extraDiscoveryRules: |-
          rule {
            target_label = "log_source"
            replacement = "kim7s"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_controller_name"]
            regex         = "([0-9a-z-.]+?)(-[0-9a-f]{8,10})?"
            target_label  = "__tmp_controller_name"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name", "__meta_kubernetes_pod_label_app", "__tmp_controller_name", "__meta_kubernetes_pod_name"]
            regex         = "^;*([^;]+)(;.*)?$"
            target_label  = "app"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_instance", "__meta_kubernetes_pod_label_instance"]
            regex         = "^;*([^;]+)(;.*)?$"
            target_label  = "instance"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node_name"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_image"]
            target_label  = "image"
          }
      labelsToKeep:
      - app
      - cluster
      - container
      - flags
      - image
      - log_source
      - namespace
      - node_name
      - pod
      - stream
      - instance
      - source
    selfReporting:
      enabled: true             
    applicationObservability:
      enabled: false
    global:
      scrapeInterval: 5m