apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
spec:
  interval: 1h
  chart:
    spec:
      chart: csi-driver-nfs
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
      version: "4.8.0"
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    controller:
      runOnControlPlane: true
    storageClass:
      create: true
      name: nfs-csi
      parameters:
        server: storage.internal.kim.tec.br
        share: /mnt/default-mirror-hdd-1tb/kubernetes
        mountPermissions: "0755"
        subDir:  ${pvc.metadata.name}-${pv.metadata.name}
