apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chaos-mesh
spec:
  releaseName: chaos-mesh
  interval: 10m
  chart:
    spec:
      chart: chaos-mesh
      version: "=2.8.1"
      sourceRef:
        kind: HelmRepository
        name: chaos-mesh
      interval: 5m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    controllerManager:
      replicaCount: 1
      leaderElection:
        enabled: false
    dashboard:
      create: false
    chaosDaemon:
      runtime: containerd
      socketPath: /run/containerd/containerd.sock
